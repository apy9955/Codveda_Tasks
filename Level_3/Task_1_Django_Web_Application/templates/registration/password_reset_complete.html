{% extends "base.html" %}
{% block title %}Password Reset Complete · Codveda Auth{% endblock %}

{% block content %}
<div class="auth-shell">
  <div class="col-lg-6 d-none d-lg-flex auth-side">
    <div style="position: relative; z-index: 1; max-width: 440px;">
      <span class="brand-mark d-inline-flex mb-4">C</span>
      <h1 class="fw-bold mb-3">All set</h1>
      <p class="fs-5" style="color: rgba(255,255,255,0.85);">
        Your password has been changed successfully.
      </p>
    </div>
  </div>

  <div class="col-lg-6 auth-form-side">
    <div class="auth-card text-center">
      <div class="display-6 mb-3"><i class="bi bi-check-circle text-success"></i></div>
      <h2 class="fw-bold mb-2">Password updated</h2>
      <p class="text-muted mb-4">You can now sign in with your new password.</p>
      <a href="{% url 'login' %}" class="btn btn-primary w-100">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
